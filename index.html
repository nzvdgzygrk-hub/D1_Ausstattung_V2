<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bestellübersicht Saison 2026/27</title>
<style>
*{box-sizing:border-box}
html,body{width:100%;max-width:100%;overflow-x:hidden}
body{font-family:Arial;margin:10px;background:#f6f7f9}
h1{text-align:center}
.status{padding:10px;background:#fff;border:1px solid #ddd;border-radius:8px;text-align:center;margin-bottom:10px;font-weight:bold}
.warning{display:none;padding:10px;background:#ffe1e1;border:1px solid #d60000;color:#900;border-radius:8px;text-align:center;margin-bottom:10px;font-weight:bold}
.controls{width:100%;max-width:500px;margin:0 auto 10px}
button{width:100%;display:block;margin:8px 0;padding:12px;background:#222;color:#fff;border:0;border-radius:8px;font-size:15px}
.export-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.export-row button{margin:0}
.export-row .image{background:#50545a}
.table-wrap{width:100%;overflow:visible;border-radius:4px}
table{width:100%;min-width:0;background:#fff;border-collapse:collapse;table-layout:fixed}
col.player{width:20%}col.number{width:14%}col.size{width:11%}
th,td{border:1px solid #ddd;padding:5px 2px;text-align:center;overflow:hidden}
th{background:#eee}
td:first-child{white-space:nowrap;text-overflow:ellipsis}
.group{background:#dfe7ff!important;font-size:14px;font-weight:bold;border-top:2px solid #1e88e5!important;border-left:2px solid #1e88e5!important;border-right:2px solid #1e88e5!important;border-bottom:0!important;overflow-wrap:anywhere}
.gstart{border-left:2px solid #1e88e5!important}.gend{border-right:2px solid #1e88e5!important}.gbottom{border-bottom:2px solid #1e88e5!important}
select{display:block;width:100%;max-width:100%;min-width:0;font-size:14px;padding-left:2px}.nr{width:100%;min-width:0;font-size:15px;padding-left:4px}.nr.duplicate{background:#ffb3b3;border:2px solid #d60000}
.footer{text-align:center;font-size:12px;color:#777;margin-top:20px}
@media(max-width:600px){body{margin:4px}h1{font-size:22px}.controls{padding:0 8px}button{font-size:15px;padding:11px 8px}.export-row{gap:6px}.export-row button{font-size:14px}th,td{padding:5px 1px;font-size:12px}select{font-size:13px}.nr{font-size:14px}.group{font-size:13px}}
</style>
</head>
<body>
<h1>Bestellübersicht Saison 2026/27</h1>
<div class="status" id="status">Lade...</div>
<div class="warning" id="warning">Doppelte Rückennummer vorhanden. Bitte korrigieren.</div>
<div class="controls">
  <button onclick="syncAll()">Speichern</button>
  <div class="export-row"><button onclick="exportTrikots()">Trikot Export</button><button class="image" onclick="exportTrikotsBild()">Trikot als Bild</button></div>
  <div class="export-row"><button onclick="exportPraes()">Präs. Export</button><button class="image" onclick="exportPraesBild()">Präs. als Bild</button></div>
  <div class="export-row"><button onclick="exportWinter()">Winter Export</button><button class="image" onclick="exportWinterBild()">Winter als Bild</button></div>
</div>
<div class="table-wrap">
<table>
<colgroup><col class="player"><col class="number"><col class="size"><col class="size"><col class="size"><col class="size"><col class="size"><col class="size"></colgroup>
<thead>
<tr><th rowspan="2" style="border-bottom:1px solid #ddd;">Spieler</th><th rowspan="2" style="border-bottom:1px solid #ddd;">Nr</th><th colspan="2" class="group">Trikot</th><th colspan="3" class="group">Präsentationsanzug</th><th colspan="1" class="group">Winterjacke</th></tr>
<tr><th class="gstart gbottom">Oberteil</th><th class="gend gbottom">Hose</th><th class="gstart gbottom">Jacke</th><th class="gbottom">T-Shirt</th><th class="gend gbottom">Hose</th><th class="gstart gend gbottom">Winter</th></tr>
</thead>
<tbody id="tb"></tbody>
</table>
</div>
<div class="footer">Programmiert von F. Kaplan</div>
<script>
const API_URL="https://script.google.com/macros/s/AKfycbytXhWsaJgviOX_TMJKqefWSO99I6LE0pXnr48jJrXYJdD85yDrWqe2714NqED40C5j/exec";
const goalkeepers=["Paul B.","Noel","Benjamin"];
function isGoalkeeper(name){return goalkeepers.includes(name)}
const players=[{n:"Paul B.",nr:1},{n:"Benjamin",nr:2},{n:"Noel",nr:3},{n:"Mika",nr:4},{n:"Mario K.",nr:5},{n:"Jonas K.",nr:6},{n:"Julian H.",nr:7},{n:"Malik V.",nr:9},{n:"Paul H.",nr:10},{n:"Semih D.",nr:11},{n:"Elias",nr:12},{n:"Aos A.",nr:13},{n:"Piotr K.",nr:14},{n:"Efe K.",nr:16},{n:"Kirill B.",nr:19},{n:"Jannik H.",nr:22},{n:"David W.",nr:30},{n:"Ahmet S.",nr:61}];
function setStatus(t){document.getElementById("status").innerText=t}
function sortRowsByNumber(){const tb=document.getElementById("tb");[...tb.querySelectorAll("tr")].sort((a,b)=>{const na=Number(a.querySelector(".nr")?.value||9999);const nb=Number(b.querySelector(".nr")?.value||9999);return na-nb||String(a.dataset.name||"").localeCompare(String(b.dataset.name||""),"de")}).forEach(r=>tb.appendChild(r))}
function checkNumbers(){const nums={};let hasDuplicate=false;document.querySelectorAll(".nr").forEach(sel=>{sel.classList.remove("duplicate");const val=sel.value;if(!nums[val])nums[val]=[];nums[val].push(sel)});Object.values(nums).forEach(list=>{if(list.length>1){hasDuplicate=true;list.forEach(sel=>sel.classList.add("duplicate"))}});document.getElementById("warning").style.display=hasDuplicate?"block":"none";return !hasDuplicate}
function row(p){return `<tr data-name="${p.n}"><td>${p.n}</td><td><select class="nr" onchange="checkNumbers();sortRowsByNumber()">${Array.from({length:99},(_,i)=>`<option ${i+1==p.nr?'selected':''}>${i+1}</option>`).join("")}</select></td><td><select class="o"></select></td><td><select class="h"></select></td><td><select class="j"></select></td><td><select class="t"></select></td><td><select class="h2"></select></td><td><select class="w"></select></td></tr>`}
function opt(){return "<option></option><option>S</option><option>M</option><option>L</option><option>XL</option><option>164</option>"}
function build(){document.getElementById("tb").innerHTML=players.map(row).join("");document.querySelectorAll("select:not(.nr)").forEach(s=>s.innerHTML=opt());checkNumbers();sortRowsByNumber()}
async function load(){try{const res=await fetch(API_URL);const data=await res.json();if(!Array.isArray(data)){setStatus("Fehler beim Laden");return}data.forEach(d=>{let r=[...document.querySelectorAll("tbody tr")].find(x=>x.dataset.name===d.spieler);if(String(d.nummer||"")==="GELOESCHT"){if(r)r.remove();return}if(!r){document.getElementById("tb").insertAdjacentHTML("beforeend",row({n:d.spieler,nr:d.nummer||1}));r=document.getElementById("tb").lastElementChild;r.querySelectorAll("select:not(.nr)").forEach(s=>s.innerHTML=opt())}r.querySelector(".nr").value=d.nummer||"";r.querySelector(".o").value=d.trikotOberteil||"";r.querySelector(".h").value=d.trikotHose||"";r.querySelector(".j").value=d.praesJacke||"";r.querySelector(".t").value=d.praesShirt||"";r.querySelector(".h2").value=d.praesHose||"";r.querySelector(".w").value=d.winterjacke||""});checkNumbers();sortRowsByNumber();setStatus("geladen")}catch(e){console.log(e);setStatus("Fehler beim Laden")}}
async function syncAll(){try{if(!checkNumbers()){setStatus("Speichern blockiert: doppelte Rückennummer");alert("Doppelte Rückennummer vorhanden. Bitte zuerst korrigieren.");return}sortRowsByNumber();setStatus("Speichern...");const payload=[...document.querySelectorAll("tbody tr")].map(r=>({spieler:r.dataset.name,nummer:r.querySelector(".nr").value,trikotOberteil:r.querySelector(".o").value,trikotHose:r.querySelector(".h").value,praesJacke:r.querySelector(".j").value,praesShirt:r.querySelector(".t").value,praesHose:r.querySelector(".h2").value,winterjacke:r.querySelector(".w").value}));await fetch(API_URL,{method:"POST",body:JSON.stringify({batch:payload})});setStatus("gespeichert ✔")}catch(e){console.log(e);setStatus("Fehler beim Speichern ❌")}}
function sortNumbers(list){return list.sort((a,b)=>Number(a)-Number(b))}
function gruppieren(sel,filterFn=()=>true){const m={};document.querySelectorAll("tbody tr").forEach(r=>{if(!filterFn(r))return;const v=r.querySelector(sel).value;if(!v)return;if(!m[v])m[v]=[];m[v].push(r.querySelector(".nr").value)});Object.keys(m).forEach(k=>m[k]=sortNumbers(m[k]));return m}
function isTwRow(r){return isGoalkeeper(r.dataset.name)}
function isFieldRow(r){return !isGoalkeeper(r.dataset.name)}
function format(title,data){const order=["164","S","M","L","XL"];let t=title+"\n\n";let sum=0;order.forEach(s=>{if(!data[s])return;sum+=data[s].length;t+=`${s} (${data[s].length}x): ${data[s].join(", ")}\n`});return t+"\nGesamt: "+sum+" Stück"}
function formatOhneNummern(title,data){const order=["164","S","M","L","XL"];let t=title+"\n\n";let sum=0;order.forEach(s=>{if(!data[s])return;sum+=data[s].length;t+=`${s}: ${data[s].length}x\n`});return t+"\nGesamt: "+sum+" Stück"}
function copy(t){navigator.clipboard.writeText(t).then(()=>alert("kopiert")).catch(()=>{const a=document.createElement("textarea");a.value=t;document.body.appendChild(a);a.select();document.execCommand("copy");a.remove();alert("kopiert")})}
function exportTrikots(){const feldOberteil=gruppieren(".o",isFieldRow);const twOberteil=gruppieren(".o",isTwRow);const feldHose=gruppieren(".h",isFieldRow);const twHose=gruppieren(".h",isTwRow);copy("FELDSPIELER TRIKOT OBERTEIL\n\n"+format("Oberteil",feldOberteil)+"\n\nTORWART TRIKOT OBERTEIL\n\n"+format("TW Oberteil",twOberteil)+"\n\nFELDSPIELER TRIKOT HOSE\n\n"+formatOhneNummern("Hose",feldHose)+"\n\nTORWART TRIKOT HOSE\n\n"+formatOhneNummern("TW Hose",twHose))}
function exportPraes(){copy("PRÄSENTATION\n\n"+format("Jacke",gruppieren(".j"))+"\n\nT-SHIRT\n\n"+format("Shirt",gruppieren(".t"))+"\n\nHOSE\n\n"+format("Hose",gruppieren(".h2")))}
function exportWinter(){copy("WINTERJACKE\n\n"+format("Winter",gruppieren(".w")))}
function getRows(columns,filterFn=()=>true){return [...document.querySelectorAll("tbody tr")].filter(filterFn).map(r=>{const item={spieler:r.dataset.name,nr:r.querySelector(".nr").value};columns.forEach(c=>item[c.key]=r.querySelector(c.sel).value||"–");return item}).sort((a,b)=>Number(a.nr)-Number(b.nr)||a.spieler.localeCompare(b.spieler,"de"))}
function countText(rows,key,label){const order=["164","S","M","L","XL"];const counts={};rows.forEach(r=>{const v=r[key];if(v&&v!=="–")counts[v]=(counts[v]||0)+1});const parts=order.filter(s=>counts[s]).map(s=>`${s}: ${counts[s]}x`);return `${label}: ${parts.length?parts.join(" · "):"keine Angaben"}`}
function shareCanvas(canvas,filePrefix,title){canvas.toBlob(async blob=>{if(!blob){alert("Bild konnte nicht erstellt werden.");return}const datum=new Date().toISOString().slice(0,10);const file=new File([blob],`${filePrefix}-${datum}.png`,{type:"image/png"});try{if(navigator.canShare&&navigator.canShare({files:[file]})){await navigator.share({files:[file],title})}else{const a=document.createElement("a");const url=URL.createObjectURL(blob);a.href=url;a.download=file.name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),2000)}}catch(e){if(e.name!=="AbortError"){console.log(e);alert("Bild konnte nicht geteilt werden.")}}},"image/png")}
function exportTableImage(config){
  if(!checkNumbers()){alert("Doppelte Rückennummer vorhanden. Bitte zuerst korrigieren.");return}
  const scale=2,canvasWidth=1080,margin=40,titleHeight=100,sectionTitleHeight=58,headerHeight=62,rowHeight=54,summaryHeight=34,totalHeight=38,sectionGap=34,tableWidth=canvasWidth-(margin*2);
  const sectionHeight=s=>sectionTitleHeight+headerHeight+(s.rows.length*rowHeight)+(s.summaries.length*summaryHeight)+totalHeight;
  const canvasHeight=margin+titleHeight+config.sections.reduce((sum,s)=>sum+sectionHeight(s),0)+sectionGap*(config.sections.length-1)+margin;
  const canvas=document.createElement("canvas");canvas.width=canvasWidth*scale;canvas.height=canvasHeight*scale;
  const ctx=canvas.getContext("2d");ctx.scale(scale,scale);ctx.fillStyle="#fff";ctx.fillRect(0,0,canvasWidth,canvasHeight);ctx.textBaseline="middle";
  ctx.fillStyle="#111";ctx.textAlign="center";ctx.font="bold 36px Arial";ctx.fillText(config.title,canvasWidth/2,margin+32);ctx.font="24px Arial";ctx.fillText("Saison 2026/27",canvasWidth/2,margin+70);
  let y=margin+titleHeight;
  function cell(x,yPos,w,h,text,bold=false,align="center",fill="#fff"){ctx.fillStyle=fill;ctx.fillRect(x,yPos,w,h);ctx.strokeStyle="#b8bcc2";ctx.lineWidth=1.5;ctx.strokeRect(x,yPos,w,h);ctx.fillStyle="#111";ctx.font=`${bold?'bold ':''}24px Arial`;ctx.textAlign=align;const tx=align==="left"?x+14:x+w/2;ctx.fillText(String(text),tx,yPos+h/2)}
  config.sections.forEach((section,index)=>{
    ctx.fillStyle="#dfe7ff";ctx.fillRect(margin,y,tableWidth,sectionTitleHeight);ctx.strokeStyle="#1e88e5";ctx.lineWidth=2;ctx.strokeRect(margin,y,tableWidth,sectionTitleHeight);ctx.fillStyle="#111";ctx.font="bold 28px Arial";ctx.textAlign="left";ctx.fillText(section.title,margin+16,y+sectionTitleHeight/2);y+=sectionTitleHeight;
    let x=margin;config.columns.forEach(c=>{cell(x,y,c.width,headerHeight,c.label,true,"center","#eeeeee");x+=c.width});y+=headerHeight;
    section.rows.forEach(r=>{x=margin;config.columns.forEach((c,i)=>{cell(x,y,c.width,rowHeight,r[c.key],false,i===0?"left":"center");x+=c.width});y+=rowHeight});
    section.summaries.forEach(text=>{ctx.fillStyle="#f6f7f9";ctx.fillRect(margin,y,tableWidth,summaryHeight);ctx.strokeStyle="#d0d3d7";ctx.strokeRect(margin,y,tableWidth,summaryHeight);ctx.fillStyle="#111";ctx.font="21px Arial";ctx.textAlign="left";ctx.fillText(text,margin+14,y+summaryHeight/2);y+=summaryHeight});
    ctx.fillStyle="#eef0f3";ctx.fillRect(margin,y,tableWidth,totalHeight);ctx.strokeStyle="#b8bcc2";ctx.strokeRect(margin,y,tableWidth,totalHeight);ctx.fillStyle="#111";ctx.font="bold 21px Arial";ctx.textAlign="right";ctx.fillText(`Gesamt: ${section.rows.length} Spieler`,margin+tableWidth-14,y+totalHeight/2);y+=totalHeight;
    if(index<config.sections.length-1)y+=sectionGap;
  });
  shareCanvas(canvas,config.filePrefix,config.shareTitle)
}
function exportTrikotsBild(){const columns=[{key:"spieler",label:"Spieler",width:400},{key:"nr",label:"Nr.",width:120},{key:"oberteil",label:"Oberteil",width:240},{key:"hose",label:"Hose",width:240}];const source=[{key:"oberteil",sel:".o"},{key:"hose",sel:".h"}];const feld=getRows(source,isFieldRow),tw=getRows(source,isTwRow);exportTableImage({title:"TRIKOT-BESTELLLISTE",filePrefix:"Trikot-Bestellliste",shareTitle:"Trikot-Bestellliste",columns,sections:[{title:"FELDSPIELER",rows:feld,summaries:[countText(feld,"oberteil","Oberteil"),countText(feld,"hose","Hose")]},{title:"TORHÜTER",rows:tw,summaries:[countText(tw,"oberteil","Oberteil"),countText(tw,"hose","Hose")]}]})}
function exportPraesBild(){const columns=[{key:"spieler",label:"Spieler",width:330},{key:"nr",label:"Nr.",width:110},{key:"jacke",label:"Jacke",width:187},{key:"shirt",label:"T-Shirt",width:186},{key:"hose",label:"Hose",width:187}];const rows=getRows([{key:"jacke",sel:".j"},{key:"shirt",sel:".t"},{key:"hose",sel:".h2"}]);exportTableImage({title:"PRÄSENTATIONSANZUG",filePrefix:"Praesentationsanzug",shareTitle:"Präsentationsanzug",columns,sections:[{title:"ALLE SPIELER",rows,summaries:[countText(rows,"jacke","Jacke"),countText(rows,"shirt","T-Shirt"),countText(rows,"hose","Hose")]}]})}
function exportWinterBild(){const columns=[{key:"spieler",label:"Spieler",width:500},{key:"nr",label:"Nr.",width:140},{key:"winter",label:"Winterjacke",width:360}];const rows=getRows([{key:"winter",sel:".w"}]);exportTableImage({title:"WINTERJACKEN",filePrefix:"Winterjacken",shareTitle:"Winterjacken",columns,sections:[{title:"ALLE SPIELER",rows,summaries:[countText(rows,"winter","Winterjacke")]}]})}
build();load();
</script>
</body>
</html>
