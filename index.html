<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bestellübersicht Saison 2026/27</title>
<style>
*{box-sizing:border-box}html,body{width:100%;max-width:100%;overflow-x:hidden}body{font-family:Arial;margin:10px;background:#f6f7f9}h1{text-align:center}.status{padding:10px;background:#fff;border:1px solid #ddd;border-radius:8px;text-align:center;margin-bottom:10px;font-weight:bold}.warning{display:none;padding:10px;background:#ffe1e1;border:1px solid #d60000;color:#900;border-radius:8px;text-align:center;margin-bottom:10px;font-weight:bold}.controls{width:100%;max-width:500px;margin:0 auto 10px}button{width:100%;display:block;margin:8px 0;padding:12px;background:#222;color:#fff;border:0;border-radius:8px;font-size:15px}.export-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.export-row button{margin:0}.export-row .image{background:#50545a}.mobile-tabs,.mobile-header{display:none}.table-wrap{width:100%;overflow:visible;border-radius:4px}table{width:100%;background:#fff;border-collapse:collapse;table-layout:fixed}col.player{width:20%}col.number{width:14%}col.size{width:11%}th,td{border:1px solid #ddd;padding:5px 2px;text-align:center;overflow:hidden}th{background:#eee}td:first-child{white-space:nowrap;text-overflow:ellipsis}.group{background:#dfe7ff!important;font-size:14px;font-weight:bold;border-top:2px solid #1e88e5!important;border-left:2px solid #1e88e5!important;border-right:2px solid #1e88e5!important;border-bottom:0!important;overflow-wrap:anywhere}.gstart{border-left:2px solid #1e88e5!important}.gend{border-right:2px solid #1e88e5!important}.gbottom{border-bottom:2px solid #1e88e5!important}select{display:block;width:100%;max-width:100%;min-width:0;font-size:14px;padding-left:2px}.nr{font-size:15px;padding-left:4px}.nr.duplicate{background:#ffb3b3;border:2px solid #d60000}.footer{text-align:center;font-size:12px;color:#777;margin-top:20px}
@media(max-width:600px){body{margin:4px}h1{font-size:22px}.controls{padding:0 8px}button{font-size:15px;padding:11px 8px}.export-row{gap:6px}.export-row button{font-size:14px}.mobile-tabs{display:grid;grid-template-columns:1fr 1.35fr 1fr;gap:6px;margin:12px 0 6px}.mobile-tabs button{margin:0;padding:10px 3px;background:#dfe3e8;color:#111;border:1px solid #c3c8cf;font-size:14px}.mobile-tabs button.active{background:#1e88e5;color:#fff;border-color:#1e88e5}.mobile-header{display:grid;background:#eee;border-top:1px solid #d5d5d5;border-left:1px solid #d5d5d5;font-weight:bold;font-size:13px}.mobile-header div{display:flex;align-items:center;justify-content:center;min-height:48px;padding:5px 2px;border-right:1px solid #d5d5d5;border-bottom:1px solid #d5d5d5;text-align:center}table,tbody{display:block;width:100%}thead,colgroup{display:none}tbody tr{display:grid;width:100%}tbody td{display:flex;align-items:center;justify-content:center;min-width:0;min-height:54px;padding:5px 3px;font-size:15px}.player-cell{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}select{font-size:16px;padding-left:4px}.nr{font-size:17px;padding-left:6px}body[data-view="trikot"] .mobile-header,body[data-view="trikot"] tbody tr{grid-template-columns:31% 21% 26% 22%}body[data-view="praes"] .mobile-header,body[data-view="praes"] tbody tr{grid-template-columns:27% 19% 18% 18% 18%}body[data-view="winter"] .mobile-header,body[data-view="winter"] tbody tr{grid-template-columns:40% 23% 37%}body[data-view="trikot"] .praes-col,body[data-view="trikot"] .winter-col,body[data-view="praes"] .trikot-col,body[data-view="praes"] .winter-col,body[data-view="winter"] .trikot-col,body[data-view="winter"] .praes-col{display:none}}
</style>
</head>
<body data-view="trikot">
<h1>Bestellübersicht Saison 2026/27</h1>
<div class="status" id="status">Lade...</div>
<div class="warning" id="warning">Doppelte Rückennummer vorhanden. Bitte korrigieren.</div>
<div class="controls">
<button onclick="syncAll()">Speichern</button>
<div class="export-row"><button onclick="exportTrikots()">Trikot Export</button><button class="image" onclick="exportTrikotsBild()">Trikot als Bild</button></div>
<div class="export-row"><button onclick="exportPraes()">Präs. Export</button><button class="image" onclick="exportPraesBild()">Präs. als Bild</button></div>
<div class="export-row"><button onclick="exportWinter()">Winter Export</button><button class="image" onclick="exportWinterBild()">Winter als Bild</button></div>
</div>
<div class="mobile-tabs">
<button type="button" class="active" data-view-button="trikot" onclick="setView('trikot')">Trikot</button>
<button type="button" data-view-button="praes" onclick="setView('praes')">Präsentation</button>
<button type="button" data-view-button="winter" onclick="setView('winter')">Winterjacke</button>
</div>
<div class="mobile-header" id="mobileHeader"></div>
<div class="table-wrap"><table>
<colgroup><col class="player"><col class="number"><col class="size"><col class="size"><col class="size"><col class="size"><col class="size"><col class="size"></colgroup>
<thead>
<tr><th rowspan="2">Spieler</th><th rowspan="2">Nr</th><th colspan="2" class="group trikot-col">Trikot</th><th colspan="3" class="group praes-col">Präsentationsanzug</th><th class="group winter-col">Winterjacke</th></tr>
<tr><th class="gstart gbottom trikot-col">Oberteil</th><th class="gend gbottom trikot-col">Hose</th><th class="gstart gbottom praes-col">Jacke</th><th class="gbottom praes-col">T-Shirt</th><th class="gend gbottom praes-col">Hose</th><th class="gstart gend gbottom winter-col">Winter</th></tr>
</thead><tbody id="tb"></tbody></table></div>
<div class="footer">Programmiert von F. Kaplan</div>
<script>
const API_URL="https://script.google.com/macros/s/AKfycbytXhWsaJgviOX_TMJKqefWSO99I6LE0pXnr48jJrXYJdD85yDrWqe2714NqED40C5j/exec";
const goalkeepers=["Paul B.","Noel","Benjamin"];
const players=[{n:"Paul B.",nr:1},{n:"Benjamin",nr:2},{n:"Noel",nr:3},{n:"Mika",nr:4},{n:"Mario K.",nr:5},{n:"Jonas K.",nr:6},{n:"Julian H.",nr:7},{n:"Malik V.",nr:9},{n:"Paul H.",nr:10},{n:"Semih D.",nr:11},{n:"Elias",nr:12},{n:"Aos A.",nr:13},{n:"Piotr K.",nr:14},{n:"Efe K.",nr:16},{n:"Kirill B.",nr:19},{n:"Jannik H.",nr:22},{n:"David W.",nr:30},{n:"Ahmet S.",nr:61}];
const mobileHeaders={trikot:["Spieler","Nr","Oberteil","Hose"],praes:["Spieler","Nr","Jacke","T-Shirt","Hose"],winter:["Spieler","Nr","Winterjacke"]};
function setView(v){document.body.dataset.view=v;document.querySelectorAll("[data-view-button]").forEach(b=>b.classList.toggle("active",b.dataset.viewButton===v));document.getElementById("mobileHeader").innerHTML=mobileHeaders[v].map(x=>`<div>${x}</div>`).join("")}
function isGoalkeeper(n){return goalkeepers.includes(n)}
function setStatus(t){document.getElementById("status").innerText=t}
function sortRowsByNumber(){const tb=document.getElementById("tb");[...tb.querySelectorAll("tr")].sort((a,b)=>Number(a.querySelector(".nr")?.value||9999)-Number(b.querySelector(".nr")?.value||9999)||String(a.dataset.name||"").localeCompare(String(b.dataset.name||""),"de")).forEach(r=>tb.appendChild(r))}
function checkNumbers(){const nums={};let d=false;document.querySelectorAll(".nr").forEach(s=>{s.classList.remove("duplicate");(nums[s.value]??=[]).push(s)});Object.values(nums).forEach(a=>{if(a.length>1){d=true;a.forEach(s=>s.classList.add("duplicate"))}});document.getElementById("warning").style.display=d?"block":"none";return !d}
function row(p){return `<tr data-name="${p.n}"><td class="player-cell">${p.n}</td><td><select class="nr" onchange="checkNumbers();sortRowsByNumber()">${Array.from({length:99},(_,i)=>`<option ${i+1==p.nr?'selected':''}>${i+1}</option>`).join("")}</select></td><td class="trikot-col"><select class="o"></select></td><td class="trikot-col"><select class="h"></select></td><td class="praes-col"><select class="j"></select></td><td class="praes-col"><select class="t"></select></td><td class="praes-col"><select class="h2"></select></td><td class="winter-col"><select class="w"></select></td></tr>`}
function opt(){return "<option></option><option>S</option><option>M</option><option>L</option><option>XL</option><option>164</option>"}
function build(){document.getElementById("tb").innerHTML=players.map(row).join("");document.querySelectorAll("select:not(.nr)").forEach(s=>s.innerHTML=opt());checkNumbers();sortRowsByNumber()}
async function load(){try{const res=await fetch(API_URL),data=await res.json();if(!Array.isArray(data)){setStatus("Fehler beim Laden");return}data.forEach(d=>{let r=[...document.querySelectorAll("tbody tr")].find(x=>x.dataset.name===d.spieler);if(String(d.nummer||"")==="GELOESCHT"){if(r)r.remove();return}if(!r){document.getElementById("tb").insertAdjacentHTML("beforeend",row({n:d.spieler,nr:d.nummer||1}));r=document.getElementById("tb").lastElementChild;r.querySelectorAll("select:not(.nr)").forEach(s=>s.innerHTML=opt())}r.querySelector(".nr").value=d.nummer||"";r.querySelector(".o").value=d.trikotOberteil||"";r.querySelector(".h").value=d.trikotHose||"";r.querySelector(".j").value=d.praesJacke||"";r.querySelector(".t").value=d.praesShirt||"";r.querySelector(".h2").value=d.praesHose||"";r.querySelector(".w").value=d.winterjacke||""});checkNumbers();sortRowsByNumber();setStatus("geladen")}catch(e){console.log(e);setStatus("Fehler beim Laden")}}
async function syncAll(){try{if(!checkNumbers()){setStatus("Speichern blockiert: doppelte Rückennummer");alert("Doppelte Rückennummer vorhanden. Bitte zuerst korrigieren.");return}sortRowsByNumber();setStatus("Speichern...");const batch=[...document.querySelectorAll("tbody tr")].map(r=>({spieler:r.dataset.name,nummer:r.querySelector(".nr").value,trikotOberteil:r.querySelector(".o").value,trikotHose:r.querySelector(".h").value,praesJacke:r.querySelector(".j").value,praesShirt:r.querySelector(".t").value,praesHose:r.querySelector(".h2").value,winterjacke:r.querySelector(".w").value}));await fetch(API_URL,{method:"POST",body:JSON.stringify({batch})});setStatus("gespeichert ✔")}catch(e){console.log(e);setStatus("Fehler beim Speichern ❌")}}
function sortNumbers(a){return a.sort((x,y)=>Number(x)-Number(y))}
function gruppieren(sel,filter=()=>true){const m={};document.querySelectorAll("tbody tr").forEach(r=>{if(!filter(r))return;const v=r.querySelector(sel).value;if(v)(m[v]??=[]).push(r.querySelector(".nr").value)});Object.keys(m).forEach(k=>m[k]=sortNumbers(m[k]));return m}
function isTwRow(r){return isGoalkeeper(r.dataset.name)}function isFieldRow(r){return !isGoalkeeper(r.dataset.name)}
function format(title,data){const o=["164","S","M","L","XL"];let t=title+"\n\n",sum=0;o.forEach(s=>{if(data[s]){sum+=data[s].length;t+=`${s} (${data[s].length}x): ${data[s].join(", ")}\n`}});return t+"\nGesamt: "+sum+" Stück"}
function formatOhneNummern(title,data){const o=["164","S","M","L","XL"];let t=title+"\n\n",sum=0;o.forEach(s=>{if(data[s]){sum+=data[s].length;t+=`${s}: ${data[s].length}x\n`}});return t+"\nGesamt: "+sum+" Stück"}
function copy(t){navigator.clipboard.writeText(t).then(()=>alert("kopiert")).catch(()=>{const a=document.createElement("textarea");a.value=t;document.body.appendChild(a);a.select();document.execCommand("copy");a.remove();alert("kopiert")})}
function exportTrikots(){copy("FELDSPIELER TRIKOT OBERTEIL\n\n"+format("Oberteil",gruppieren(".o",isFieldRow))+"\n\nTORWART TRIKOT OBERTEIL\n\n"+format("TW Oberteil",gruppieren(".o",isTwRow))+"\n\nFELDSPIELER TRIKOT HOSE\n\n"+formatOhneNummern("Hose",gruppieren(".h",isFieldRow))+"\n\nTORWART TRIKOT HOSE\n\n"+formatOhneNummern("TW Hose",gruppieren(".h",isTwRow)))}
function exportPraes(){copy("PRÄSENTATION\n\n"+format("Jacke",gruppieren(".j"))+"\n\nT-SHIRT\n\n"+format("Shirt",gruppieren(".t"))+"\n\nHOSE\n\n"+format("Hose",gruppieren(".h2")))}
function exportWinter(){copy("WINTERJACKE\n\n"+format("Winter",gruppieren(".w")))}
function getRows(cols,filter=()=>true){return [...document.querySelectorAll("tbody tr")].filter(filter).map(r=>{const x={spieler:r.dataset.name,nr:r.querySelector(".nr").value};cols.forEach(c=>x[c.key]=r.querySelector(c.sel).value||"–");return x}).sort((a,b)=>Number(a.nr)-Number(b.nr)||a.spieler.localeCompare(b.spieler,"de"))}
function countText(rows,key,label){const o=["164","S","M","L","XL"],c={};rows.forEach(r=>{const v=r[key];if(v&&v!=="–")c[v]=(c[v]||0)+1});const p=o.filter(s=>c[s]).map(s=>`${s}: ${c[s]}x`);return `${label}: ${p.length?p.join(" · "):"keine Angaben"}`}
function shareCanvas(canvas,prefix,title){canvas.toBlob(async blob=>{if(!blob)return alert("Bild konnte nicht erstellt werden.");const file=new File([blob],`${prefix}-${new Date().toISOString().slice(0,10)}.png`,{type:"image/png"});try{if(navigator.canShare&&navigator.canShare({files:[file]}))await navigator.share({files:[file],title});else{const a=document.createElement("a"),u=URL.createObjectURL(blob);a.href=u;a.download=file.name;a.click();setTimeout(()=>URL.revokeObjectURL(u),2000)}}catch(e){if(e.name!=="AbortError")alert("Bild konnte nicht geteilt werden.")}},"image/png")}
function exportTableImage(c){if(!checkNumbers())return alert("Doppelte Rückennummer vorhanden. Bitte zuerst korrigieren.");const scale=2,W=1080,m=40,th=100,sh=58,hh=62,rh=54,suh=34,gh=38,gap=34,tw=W-2*m;const sectionHeight=s=>sh+hh+s.rows.length*rh+s.summaries.length*suh+gh;const H=m+th+c.sections.reduce((a,s)=>a+sectionHeight(s),0)+gap*(c.sections.length-1)+m,canvas=document.createElement("canvas");canvas.width=W*scale;canvas.height=H*scale;const x=canvas.getContext("2d");x.scale(scale,scale);x.fillStyle="#fff";x.fillRect(0,0,W,H);x.textBaseline="middle";x.fillStyle="#111";x.textAlign="center";x.font="bold 36px Arial";x.fillText(c.title,W/2,m+32);x.font="24px Arial";x.fillText("Saison 2026/27",W/2,m+70);let y=m+th;function cell(px,py,w,h,text,b=false,a="center",f="#fff"){x.fillStyle=f;x.fillRect(px,py,w,h);x.strokeStyle="#b8bcc2";x.strokeRect(px,py,w,h);x.fillStyle="#111";x.font=`${b?'bold ':''}24px Arial`;x.textAlign=a;x.fillText(String(text),a==="left"?px+14:px+w/2,py+h/2)}c.sections.forEach((s,i)=>{x.fillStyle="#dfe7ff";x.fillRect(m,y,tw,sh);x.strokeStyle="#1e88e5";x.strokeRect(m,y,tw,sh);x.fillStyle="#111";x.font="bold 28px Arial";x.textAlign="left";x.fillText(s.title,m+16,y+sh/2);y+=sh;let px=m;c.columns.forEach(k=>{cell(px,y,k.width,hh,k.label,true,"center","#eee");px+=k.width});y+=hh;s.rows.forEach(r=>{px=m;c.columns.forEach((k,j)=>{cell(px,y,k.width,rh,r[k.key],false,j?"center":"left");px+=k.width});y+=rh});s.summaries.forEach(t=>{cell(m,y,tw,suh,t,false,"left","#f6f7f9");y+=suh});cell(m,y,tw,gh,`Gesamt: ${s.rows.length} Spieler`,true,"center","#eef0f3");y+=gh;if(i<c.sections.length-1)y+=gap});shareCanvas(canvas,c.filePrefix,c.shareTitle)}
function exportTrikotsBild(){const cols=[{key:"spieler",label:"Spieler",width:400},{key:"nr",label:"Nr.",width:120},{key:"oberteil",label:"Oberteil",width:240},{key:"hose",label:"Hose",width:240}],src=[{key:"oberteil",sel:".o"},{key:"hose",sel:".h"}],feld=getRows(src,isFieldRow),tw=getRows(src,isTwRow);exportTableImage({title:"TRIKOT-BESTELLLISTE",filePrefix:"Trikot-Bestellliste",shareTitle:"Trikot-Bestellliste",columns:cols,sections:[{title:"FELDSPIELER",rows:feld,summaries:[countText(feld,"oberteil","Oberteil"),countText(feld,"hose","Hose")]},{title:"TORHÜTER",rows:tw,summaries:[countText(tw,"oberteil","Oberteil"),countText(tw,"hose","Hose")]}]})}
function exportPraesBild(){const cols=[{key:"spieler",label:"Spieler",width:330},{key:"nr",label:"Nr.",width:110},{key:"jacke",label:"Jacke",width:187},{key:"shirt",label:"T-Shirt",width:186},{key:"hose",label:"Hose",width:187}],rows=getRows([{key:"jacke",sel:".j"},{key:"shirt",sel:".t"},{key:"hose",sel:".h2"}]);exportTableImage({title:"PRÄSENTATIONSANZUG",filePrefix:"Praesentationsanzug",shareTitle:"Präsentationsanzug",columns:cols,sections:[{title:"ALLE SPIELER",rows,summaries:[countText(rows,"jacke","Jacke"),countText(rows,"shirt","T-Shirt"),countText(rows,"hose","Hose")]}]})}
function exportWinterBild(){const cols=[{key:"spieler",label:"Spieler",width:500},{key:"nr",label:"Nr.",width:140},{key:"winter",label:"Winterjacke",width:360}],rows=getRows([{key:"winter",sel:".w"}]);exportTableImage({title:"WINTERJACKEN",filePrefix:"Winterjacken",shareTitle:"Winterjacken",columns:cols,sections:[{title:"ALLE SPIELER",rows,summaries:[countText(rows,"winter","Winterjacke")]}]})}
setView("trikot");build();load();
</script>
</body></html>
